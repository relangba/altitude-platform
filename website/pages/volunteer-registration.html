</head><body>
<nav>

<a class="active" href="events.html">Events</a>
</nav>

<header class="hero">
<h1>Upcoming Events</h1>
<p>Explore, observe and discover through hands-on science experiences.</p>
</header>

<main>

<section class="card">

<h2>Volunteer Registration</h2>

<form id="volunteerForm">

<label>Full Name *</label>
<input type="text" name="name" required>

<label>Email *</label>
<input type="email" name="email" required>

<label>Mobile Number *</label>
<input type="tel" name="phone" required>

<label>Age</label>
<input type="number" name="age" min="10" max="100">

<label>Occupation</label>
<input type="text" name="occupation">

<label>City</label>
<input type="text" name="city">

<label>Areas of Interest</label>

<div class="checkbox-group">
<label><input type="checkbox" name="interest" value="Birdwatching"> Birdwatching</label>

<label><input type="checkbox" name="interest" value="Astronomy"> Astronomy</label>

<label><input type="checkbox" name="interest" value="Science Outreach"> Science Outreach</label>

<label><input type="checkbox" name="interest" value="Environment"> Environment</label>

<label><input type="checkbox" name="interest" value="Photography"> Photography</label>
</div>

<label>Why would you like to volunteer?</label>

<textarea rows="5" name="remarks"></textarea>

<button type="submit">Submit Registration</button>

</form>

</section>

</main>

<footer>© 2026 Altitude Platform</footer>
</body></html>
